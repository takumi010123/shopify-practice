<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAME COFFEE｜自家焙煎コーヒー豆</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

  <header class="site-header">
    <a href="/" class="site-header__logo">
      <img src="assets/images/logo.svg" alt="" />
      MAME COFFEE
    </a>
    <div class="site-header__right">
      <nav class="site-header__nav">
        <a href="/">ホーム</a>
        <a href="/products">商品一覧</a>
        <a href="/about">お店について</a>
      </nav>
      <span class="site-header__cart">🛒 <span class="js-cart-count">0</span></span>
    </div>
  </header>

  <section class="hero">
    <h1 class="hero__title">毎朝に、一杯のしあわせを。</h1>
    <p class="hero__text">自家焙煎したコーヒー豆を、焙煎したてでお届けします。</p>
  </section>

  <section class="products">
    <h2 class="products__heading">おすすめの豆</h2>
    <div class="product-grid">

      <article class="product-card">
        <img class="product-card__image" src="assets/images/ethiopia.svg" alt="エチオピア イルガチェフェ" />
        <h3 class="product-card__title">エチオピア イルガチェフェ</h3>
        <p class="product-card__price">¥1,200</p>
        <button class="product-card__button">カートに入れる</button>
      </article>

      <article class="product-card">
        <img class="product-card__image" src="assets/images/guatemala.svg" alt="グアテマラ アンティグア" />
        <h3 class="product-card__title">グアテマラ アンティグア</h3>
        <p class="product-card__price">¥1,100</p>
        <button class="product-card__button">カートに入れる</button>
      </article>

      <article class="product-card">
        <img class="product-card__image" src="assets/images/brazil.svg" alt="ブラジル サントス" />
        <h3 class="product-card__title">ブラジル サントス</h3>
        <p class="product-card__price">¥980</p>
        <button class="product-card__button">カートに入れる</button>
      </article>

    </div>
  </section>

  <footer class="site-footer">
    <p>&copy; 2026 MAME COFFEE</p>
  </footer>

  <script src="assets/js/main.js"></script>
</body>
</html>
